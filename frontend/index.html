<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroEnergy Intelligence Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --chambray: #365480; 
            --old-gold: #CBC231; 
            --citron: #94AA1F; 
        }
        body { 
            background-color: #f8fafc; 
            color: #3F452D; 
            font-family: 'Inter', sans-serif; 
        }
        .header-gradient { 
            background: linear-gradient(135deg, var(--chambray) 0%, #1e293b 100%); 
        }
        .news-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header Corporativo -->
    <nav class="header-gradient p-6 border-b-4 border-[#CBC231] text-white shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">
                    ElectroEnergy <span class="text-[#CBC231]">Intelligence</span>
                </h1>
                <p class="text-[10px] uppercase tracking-[3px] text-[#CBC231]/80 font-bold">Venezuela Energy Sector Monitor</p>
            </div>
            <div id="status-indicator" class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
                <span class="text-[10px] font-bold uppercase opacity-70">Sincronizando...</span>
            </div>
        </div>
    </nav>

    <!-- Panel Principal -->
    <main class="max-w-6xl mx-auto p-6 md:p-10">
        <div class="mb-8">
            <h2 class="text-xl font-bold text-[#365480] border-b-2 border-[#CBC231] inline-block pb-1">Reportes de Campo</h2>
        </div>

        <div id="news-feed" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Estado inicial de carga -->
            <div class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#365480] mb-4"></div>
                <p class="text-slate-500 italic">Consultando inteligencia de mercado en tiempo real...</p>
            </div>
        </div>
    </main>

    <footer class="mt-20 p-10 border-t border-gray-200 text-center text-slate-400">
        <p class="text-[10px] uppercase tracking-widest font-bold">ElectroEnergy Group LLC © 2026</p>
    </footer>

    <script>
        // URL DE TU BACKEND EN RENDER (Ya configurada)
        const BACKEND_URL = "https://electroenergy-news-monitor.onrender.com/api/intelligence";

        async function loadNews() {
            const feed = document.getElementById('news-feed');
            const status = document.getElementById('status-indicator');

            try {
                const res = await fetch(BACKEND_URL);
                if (!res.ok) throw new Error("Servidor en reposo");

                const data = await res.json();
                
                // Actualizar Indicador
                status.innerHTML = `
                    <div class="w-2 h-2 rounded-full bg-[#94AA1F]"></div>
                    <span class="text-[10px] font-bold uppercase text-[#94AA1F]">Sistema Online</span>
                `;

                // Renderizar Noticias
                feed.innerHTML = data.news.map(n => `
                    <div class="news-card bg-white p-6 rounded-xl border-l-8 border-[#CBC231] shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[9px] font-bold uppercase px-2 py-1 bg-slate-100 rounded text-slate-500">${n.category || 'Energía'}</span>
                                <span class="text-[9px] font-bold uppercase text-[#365480]">${n.source}</span>
                            </div>
                            <h3 class="font-bold text-lg text-[#3F452D] leading-tight mb-3">${n.title}</h3>
                            <p class="text-sm text-slate-600 leading-relaxed mb-6">${n.summary}</p>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                            <span class="text-[10px] font-bold text-slate-400">${n.date || 'Hoy'}</span>
                            <a href="${n.url}" target="_blank" class="text-[#365480] font-bold text-[10px] uppercase hover:text-[#94AA1F] transition-colors">Ver Documento →</a>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                console.error(e);
                status.innerHTML = `
                    <div class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span class="text-[10px] font-bold uppercase text-red-500">Servidor Desconectado</span>
                `;
                feed.innerHTML = `
                    <div class="col-span-full bg-white p-10 rounded-xl border-2 border-dashed border-gray-200 text-center">
                        <p class="text-slate-500 mb-4 text-sm">El servidor gratuito de Render se "duerme" tras 15 min de inactividad.</p>
                        <button onclick="location.reload()" class="bg-[#365480] text-white px-6 py-2 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-[#CBC231] hover:text-[#3F452D] transition-all">
                            Despertar Servidor
                        </button>
                    </div>
                `;
            }
        }

        // Iniciar carga
        loadNews();
    </script>
</body>
</html>
